<!-- portas.html -->

<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portas</title>

<style>

body{
  font-family:Arial;
  background:#111;
  color:white;
  padding:20px;
}

h1{
  margin-bottom:20px;
}

input{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:5px;
}

button{
  padding:10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th,td{
  border:1px solid #333;
  padding:10px;
  text-align:center;
}

th{
  background:#222;
}

</style>

</head>

<body>

<h1>Portas</h1>

<input id="nome" placeholder="Nome">
<input id="ip" placeholder="IP">

<button onclick="adicionarPorta()">
Adicionar
</button>

<table>

<thead>
<tr>
<th>Nome</th>
<th>IP</th>
<th>Estado</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tbodyPortas"></tbody>

</table>

<script type="module">

import {
  db,
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc
} from "./firebase-config.js";

let portas = [];

async function autoMigrate(){

  const migrated =
    localStorage.getItem("portas_migrated");

  if(migrated === "true") return;

  const localData = JSON.parse(
    localStorage.getItem("portas") || "[]"
  );

  for(const item of localData){
    await addDoc(collection(db,"portas"),item);
  }

  localStorage.setItem(
    "portas_migrated",
    "true"
  );
}

window.adicionarPorta = async function(){

  const nome =
    document.getElementById("nome").value;

  const ip =
    document.getElementById("ip").value;

  if(!nome) return;

  await addDoc(collection(db,"portas"),{
    nome,
    ip,
    estado:"Livre"
  });

  document.getElementById("nome").value="";
  document.getElementById("ip").value="";
}

window.apagarPorta = async function(id){

  await deleteDoc(doc(db,"portas",id));
}

function render(){

  const tbody =
    document.getElementById("tbodyPortas");

  tbody.innerHTML="";

  portas.forEach((p)=>{

    tbody.innerHTML += `
      <tr>
        <td>${p.nome || ""}</td>
        <td>${p.ip || "-"}</td>
        <td>${p.estado || "Livre"}</td>
        <td>
          <button onclick="apagarPorta('${p.id}')">
            Apagar
          </button>
        </td>
      </tr>
    `;
  });
}

async function init(){

  await autoMigrate();

  onSnapshot(collection(db,"portas"),(snapshot)=>{

    portas = snapshot.docs.map(docSnap=>({
      id:docSnap.id,
      ...docSnap.data()
    }));

    render();
  });
}

init();

</script>

</body>
</html>
