<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>App Braga Tablet</title>
  <meta name="theme-color" content="#0f172a">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="overlay" class="overlay" onclick="fecharMenu()"></div>

  <div class="app-shell">
    <aside id="sidebar" class="sidebar">
      <div class="brand">
        <img src="icon.png" alt="App Braga" class="brand-logo">
        <div>
          <h1>App Braga</h1>
          <p>Tablet</p>
        </div>
      </div>

      <nav class="side-nav">
        <button data-page="dashboard" onclick="irParaPagina('dashboard', this)">🏠 Dashboard</button>
        <button data-page="registo" onclick="irParaPagina('registo', this)">🧾 Registo</button>
        <button data-page="stock" onclick="irParaPagina('stock', this)">📦 Stock</button>
        <button data-page="historico" onclick="irParaPagina('historico', this)">🕘 Histórico</button>
        <button data-page="computadores" onclick="irParaPagina('computadores', this)">💻 Computadores</button>
        <button data-page="config" onclick="irParaPagina('config', this)">⚙️ Configurações</button>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="menu-btn" onclick="abrirMenu()">☰</button>
        <div>
          <h2 id="pageTitle">Dashboard</h2>
          <p id="pageSub">Resumo geral</p>
        </div>
      </header>

      <section id="dashboard" class="page">
        <div class="stats-grid">
          <div class="stat-card">
            <span>Stock</span>
            <strong id="countStock">0</strong>
          </div>
          <div class="stat-card">
            <span>Usados</span>
            <strong id="countUsados">0</strong>
          </div>
          <div class="stat-card">
            <span>PCs</span>
            <strong id="countPCs">0</strong>
          </div>
        </div>

        <div class="panel">
          <input id="dashboardSearch" type="text" placeholder="Pesquisar por localização..." oninput="filtrarDashboard()">
          <div id="dashboardStock" class="cards-list"></div>
        </div>
      </section>

      <section id="registo" class="page hidden">
        <div class="panel">
          <h3>Adicionar toner</h3>
          <select id="equipamento">
            <option value="">Equipamento</option>
            <option>P3155DN</option>
            <option>TASKalfa_255ci</option>
            <option>PA5500x</option>
          </select>

          <select id="localizacao">
            <option value="">Localização</option>
            <option>Sem Localização</option>
            <option>Ilha 1 - R4B2229805</option>
            <option>Ilha 2 - WD44336210</option>
            <option>Ilha 3 - R4B1395508</option>
            <option>Ilha 4 - R4B1293179</option>
            <option>Ilha 5 - R4B1293180</option>
            <option>Balcão 1 - R4B1293183</option>
            <option>Balcão 2 - R4B1293184</option>
            <option>Dep.Logistica - R4B2230012</option>
            <option>Grandes.Encomendas - R4B1293173</option>
            <option>Devoluções - R4B1395261</option>
            <option>Escritório - RVP0ZZ03770</option>
            <option>Ilha1-VRL - R4B1293169</option>
            <option>Ilha2-VRL - R4B1293174</option>
            <option>Ilha3-VRL - RVP0Z03715</option>
          </select>

          <select id="cor">
            <option value="">Cor</option>
            <option>Preto</option>
            <option>Amarelo</option>
            <option>Vermelho</option>
            <option>Azul</option>
          </select>

          <div class="date-row">
            <input id="data" type="date">
            <button class="secondary" onclick="preencherHoje()">Hoje</button>
          </div>

          <button class="primary" onclick="disponivel()">Adicionar ao stock</button>
        </div>
      </section>

      <section id="stock" class="page hidden">
        <div class="panel">
          <h3>Stock</h3>
          <input id="searchStock" type="text" placeholder="Pesquisar por localização..." oninput="filtrarStock()">
          <div id="listaStock" class="cards-list"></div>
        </div>
      </section>

      <section id="historico" class="page hidden">
        <div class="panel">
          <h3>Histórico</h3>
          <div id="listaHistorico" class="cards-list"></div>
        </div>
      </section>

      <section id="computadores" class="page hidden">
        <div class="panel">
          <h3>Instalação Computador</h3>
          <input id="nomePC" type="text" placeholder="Nome do Computador">
          <input id="dataPC" type="date">
          <div id="checklist" class="checklist-list"></div>
          <button class="primary" onclick="guardarPC()">Guardar instalação</button>
        </div>

        <div class="panel">
          <h3>Histórico de Computadores</h3>
          <div id="listaPC" class="cards-list"></div>
        </div>
      </section>

      <section id="config" class="page hidden">
        <div class="panel">
          <h3>Configurações</h3>
          <label class="toggle-row">
            <span>Dark mode</span>
            <input id="darkSwitch" type="checkbox">
          </label>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
    }
  </script>
</body>
</html>
