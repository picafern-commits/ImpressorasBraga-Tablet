<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>App Braga Tablet</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="icon.png">
</head>
<body>
  <div class="app-shell">

    <aside class="sidebar">
      <div class="brand">
        <h1>App Braga</h1>
        <p>Tablet</p>
      </div>

      <nav class="side-nav">
        <button onclick="mostrarPagina('dashboard')" class="active">🏠 Dashboard</button>
        <button onclick="mostrarPagina('registo')">🧾 Registo Toners</button>
        <button onclick="mostrarPagina('stock')">📦 Stock</button>
        <button onclick="mostrarPagina('historico')">🕘 Histórico</button>
        <button onclick="mostrarPagina('computadores')">💻 Computadores</button>
        <button onclick="mostrarPagina('config')">⚙️ Configurações</button>
      </nav>
    </aside>

    <main class="main">

      <section id="dashboard" class="page">
        <img src="logo.png" class="dashboard-logo" alt="Logo Empresa">

        <h2>Dashboard Toners</h2>
        <p class="subtitle">Gestão rápida de stock</p>

        <div class="stats-grid">
          <div class="stat-card">
            <span>Stock</span>
            <strong id="countStock">0</strong>
          </div>
          <div class="stat-card">
            <span>Usados</span>
            <strong id="countUsados">0</strong>
          </div>
          <div class="stat-card">
            <span>PCs</span>
            <strong id="countPCs">0</strong>
          </div>
        </div>
      </section>

      <section id="registo" class="page hidden">
        <div class="panel">
          <h3>Registo Toners</h3>

          <select id="equipamento">
            <option value="">Equipamento</option>
            <option>P3155DN</option>
            <option>TASKalfa_255ci</option>
            <option>PA5500x</option>
          </select>

          <select id="localizacao">
            <option value="">Localização</option>
            <option>Sem Localização</option>
            <option>Ilha 1 - R4B2229805</option>
            <option>Ilha 2 - WD44336210</option>
            <option>Ilha 3 - R4B1395508</option>
            <option>Ilha 4 - R4B1293179</option>
            <option>Ilha 5 - R4B1293180</option>
            <option>Balcão 1 - R4B1293183</option>
            <option>Balcão 2 - R4B1293184</option>
            <option>Dep.Logistica - R4B2230012</option>
            <option>Grandes.Encomendas - R4B1293173</option>
            <option>Devoluções - R4B1395261</option>
            <option>Escritório - RVP0ZZ03770</option>
            <option>Ilha1-VRL - R4B1293169</option>
            <option>Ilha2-VRL - R4B1293174</option>
            <option>Ilha3-VRL - RVP0Z03715</option>
          </select>

          <select id="cor">
            <option value="">Cor</option>
            <option>Preto</option>
            <option>Amarelo</option>
            <option>Vermelho</option>
            <option>Azul</option>
          </select>

          <input type="date" id="data">
          <button class="primary" onclick="disponivel()">Adicionar Toner</button>
        </div>
      </section>

      <section id="stock" class="page hidden">
        <div class="panel">
          <h3>Stock</h3>
          <div id="listaStock" class="cards-list"></div>
        </div>
      </section>

      <section id="historico" class="page hidden">
        <div class="panel">
          <h3>Histórico</h3>
          <div id="listaHistorico" class="cards-list"></div>
        </div>
      </section>

      <section id="computadores" class="page hidden">
        <div class="panel">
          <h3>Instalação Computador</h3>

          <input id="nomePC" placeholder="Nome do Computador">
          <input type="date" id="dataPC">

          <div id="checklist" class="checklist-list"></div>

          <button class="primary" onclick="guardarPC()">Guardar</button>
        </div>

        <div class="panel">
          <h3>Histórico PCs</h3>
          <div id="listaPC" class="cards-list"></div>
        </div>
      </section>

      <section id="config" class="page hidden">
        <div class="panel">
          <h3>Configurações</h3>
          <label class="toggle-row">
            <span>Dark mode</span>
            <input type="checkbox" id="darkSwitch">
          </label>
        </div>
      </section>

    </main>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          const regs = await navigator.serviceWorker.getRegistrations();
          for (const reg of regs) {
            await reg.unregister();
          }
        } catch (e) {
          console.log("Erro ao remover service workers antigos", e);
        }
      });
    }
  </script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
