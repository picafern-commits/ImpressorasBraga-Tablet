<!-- pistolas.html -->

<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">

<title>Pistolas</title>

<style>

body{
  background:#111;
  color:white;
  font-family:Arial;
  padding:20px;
}

input{
  padding:10px;
  margin:5px;
}

button{
  padding:10px;
  cursor:pointer;
}

table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th,td{
  border:1px solid #333;
  padding:10px;
  text-align:center;
}

</style>

</head>

<body>

<h1>Pistolas</h1>

<input id="nome" placeholder="Nome">

<button onclick="adicionarPistola()">
Adicionar
</button>

<table>

<thead>
<tr>
<th>Nome</th>
<th>Estado</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tbodyPistolas"></tbody>

</table>

<script type="module">

import {
  db,
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc
} from "./firebase-config.js";

let pistolas = [];

async function autoMigrate(){

  const migrated =
    localStorage.getItem("pistolas_migrated");

  if(migrated === "true") return;

  const localData = JSON.parse(
    localStorage.getItem("pistolas") || "[]"
  );

  for(const item of localData){
    await addDoc(collection(db,"pistolas"),item);
  }

  localStorage.setItem(
    "pistolas_migrated",
    "true"
  );
}

window.adicionarPistola = async function(){

  const nome =
    document.getElementById("nome").value;

  if(!nome) return;

  await addDoc(collection(db,"pistolas"),{
    nome,
    estado:"Disponível"
  });

  document.getElementById("nome").value="";
}

window.apagarPistola = async function(id){

  await deleteDoc(doc(db,"pistolas",id));
}

function render(){

  const tbody =
    document.getElementById("tbodyPistolas");

  tbody.innerHTML="";

  pistolas.forEach((p)=>{

    tbody.innerHTML += `
      <tr>
        <td>${p.nome}</td>
        <td>${p.estado}</td>
        <td>
          <button onclick="apagarPistola('${p.id}')">
            Apagar
          </button>
        </td>
      </tr>
    `;
  });
}

async function init(){

  await autoMigrate();

  onSnapshot(collection(db,"pistolas"),(snapshot)=>{

    pistolas = snapshot.docs.map(docSnap=>({
      id:docSnap.id,
      ...docSnap.data()
    }));

    render();
  });
}

init();

</script>

</body>
</html>
