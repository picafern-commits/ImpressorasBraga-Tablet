<!-- users.html -->

<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">

<title>Users</title>

<style>

body{
  background:#111;
  color:white;
  font-family:Arial;
  padding:20px;
}

input,select{
  padding:10px;
  margin:5px;
}

button{
  padding:10px;
  cursor:pointer;
}

table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th,td{
  border:1px solid #333;
  padding:10px;
  text-align:center;
}

</style>

</head>

<body>

<h1>Users</h1>

<input id="nome" placeholder="Nome">
<input id="email" placeholder="Email">

<select id="role">
  <option value="user">User</option>
  <option value="admin">Admin</option>
</select>

<button onclick="adicionarUser()">
Adicionar
</button>

<table>

<thead>
<tr>
<th>Nome</th>
<th>Email</th>
<th>Role</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tbodyUsers"></tbody>

</table>

<script type="module">

import {
  db,
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc
} from "./firebase-config.js";

let users = [];

async function autoMigrate(){

  const migrated =
    localStorage.getItem("users_migrated");

  if(migrated === "true") return;

  const localData = JSON.parse(
    localStorage.getItem("users") || "[]"
  );

  for(const item of localData){
    await addDoc(collection(db,"users"),item);
  }

  localStorage.setItem(
    "users_migrated",
    "true"
  );
}

window.adicionarUser = async function(){

  const nome =
    document.getElementById("nome").value;

  const email =
    document.getElementById("email").value;

  const role =
    document.getElementById("role").value;

  if(!nome || !email) return;

  await addDoc(collection(db,"users"),{
    nome,
    email,
    role
  });

  document.getElementById("nome").value="";
  document.getElementById("email").value="";
}

window.apagarUser = async function(id){

  await deleteDoc(doc(db,"users",id));
}

function render(){

  const tbody =
    document.getElementById("tbodyUsers");

  tbody.innerHTML="";

  users.forEach((u)=>{

    tbody.innerHTML += `
      <tr>
        <td>${u.nome}</td>
        <td>${u.email}</td>
        <td>${u.role}</td>
        <td>
          <button onclick="apagarUser('${u.id}')">
            Apagar
          </button>
        </td>
      </tr>
    `;
  });
}

async function init(){

  await autoMigrate();

  onSnapshot(collection(db,"users"),(snapshot)=>{

    users = snapshot.docs.map(docSnap=>({
      id:docSnap.id,
      ...docSnap.data()
    }));

    render();
  });
}

init();

</script>

</body>
</html>
