<main class="main">

  <div class="topbar premium-topbar"><div class="topbar-main"><h1>Adicionar Toner</h1><p class="subtitle">Novo toner para stock</p></div><div class="topbar-status"><span class="status-pill">Sistema Online</span><span class="version-pill">v1.3 Premium</span></div></div>
  <div class="panel form-grid">
    <label><span>Equipamento</span>
      <select id="equipamento">
        <option value="">Selecionar equipamento</option>
        <option value="P3155DN">P3155DN</option>
        <option value="TASKalfa_255ci">TASKalfa_255ci</option>
        <option value="PA5500x">PA5500x</option>
      </select>
    </label>
    <label><span>Localização</span>
      <select id="localizacao">
        <option value="">Selecionar localização</option>
        <option value="Sem Localização">Sem Localização</option>
        <option value="Ilha 01">Ilha 01</option><option value="Ilha 02">Ilha 02</option><option value="Ilha 03">Ilha 03</option><option value="Ilha 04">Ilha 04</option><option value="Ilha 05">Ilha 05</option>
        <option value="Balcão 01">Balcão 01</option><option value="Balcão 02">Balcão 02</option>
        <option value="Dep. Logistica">Dep. Logistica</option><option value="G/Encomendas">G/Encomendas</option><option value="Devoluções">Devoluções</option><option value="Escritorio">Escritorio</option>
      </select>
    </label>
    <label><span>Cor</span>
      <select id="cor">
        <option value="">Selecionar cor</option>
        <option value="Preto">Preto</option><option value="Amarelo">Amarelo</option><option value="Vermelho">Vermelho</option><option value="Azul">Azul</option>
      </select>
    </label>
    <label><span>Data</span><input type="date" id="data"></label>
    <button class="primary-btn" onclick="disponivel()">Adicionar ao stock</button>
  </div>
